落浮黎空歌保珍惡奕無品洞妙至真元梵恢漠幽寂度人子丑玉子子丑午唵吽吒唎𠰮㕭㖇呿午未坤離玉子魑魁斗旨𩲕𩲓魁斗尊魁斗勝無上混元宗壇遵奉元始符命疾如風火十方三界頃刻遙聞宣召靈寶變食神王三天持寶籙將軍生神九章符使地道功曹三元五道大神五方引魂童子社令里域神員合干官君將吏是日所備法食品饌均垂歆受承領符籙護送魂儀具有關文合行宣告宣護送關化己關文宣示神聽必從於就法壇用憑火化護送十方孤魂往生南宫生天脫化教有真言羽衆加持魂神澄正萬氣長存不經苦惱身有光明三界侍衛五帝司迎萬神朝禮名書上天功滿德就飛升上清急急如律令用令望空大書此諱畢揑子文默念火鈴炎熾子成變八方未速送衆魂巳上寅生丑天玉堂午出兩手揑蓮花訣存孤魂在中宮水火二氣九鍊成真升上泥丸直出一線人天脫化徑上南宫見存獲福生天得道天尊伏以餓鬼道中久隨塵沙之劫愛河岸上難瞻天日之光若非太上留此因緣安得汝等離諸苦趣沉淪實久矣憔悴可哀哉臨軒對月夜沉沉泣雨啼春聲嘖嘖黃沙度口凄凉荒草夕陽天白浪江頭冷冷淡淡寒食節白骨成堆誰個是主黑風漂蕩何處家鄉幸逢此日法筵開積劫纍年𡨚債釋九重鳳詔幽關夜壑悉番騰萬斛龍舟苦海愛河輕掉過俱沾妙力隨願超升法侣慈悲同音讚咏東極宫青華府太乙救苦大天尊天塗滅卻驅雷苦奉送孤魂第一程步步蓮花生足下歡歡喜喜上朱陵送孤魂上朱陵聞經悟道大天尊南極宫朱陵府火鍊丹界大天尊地塗滅卻負石苦奉送孤魂第二程步步蓮花生足下歡歡喜喜上朱陵送孤魂上朱陵聞經悟道大天尊西極宫黃華府生天得道大天尊水塗滅卻推沙苦奉送孤魂第三程步步蓮花生足下歡歡喜喜上朱陵送孤魂上朱陵聞經悟道大天尊伏以三陽濟煉最上妙緣承斯神力普濟幽魂伏願銅柱風雷變清涼之淨界鑊湯溟冷化七寶之瑤池羅酆山下作蓬萊之閬苑鐵圍無間成洞府之仙鄉三途息苦八難停酸先祖禰師友宗親速居快樂之登之路修真霞友悟本性之真原聞法善人了玄關之奧妙四恩並報三宥齊資一切有情同登道岸志心稱念生天得道天尊向來濟煉功德並以周圓九玄七祖以超升四生六道而脫化男乘白鶴女跨青鸞逍遙不夜之天清淨長明之境東極慈尊放祥光而接引南丹真老指雲路以超升道歸三千銀世界常安常樂天京十二玉樓臺爰居爰處千江有水千江月萬里無雲萬里天此夜好向天堂路當來果報善因緣孤魂孤魂悉爾遙聞東有蓬萊島南遊朱陵府西有大福堂北無寒庭苦今宵追薦後孤魂早超升志心稱念承功脫化天尊不可思議功德卜坐回謝元始傳言地獄開無鞅數衆自天來今宵大演慈悲法禮畢還當下寶臺道太乙救苦尊稽首皈依無上經回謝十方靈寶尊師道場諸聖衆踏開三寶座師返九蓮臺幽魂生淨界五福自天來廣成儀制鐵鏆斛食全集終二仙菴藏板
