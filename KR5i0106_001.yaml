body:
  text: 武陽雲峯羽客陳仲遠校輯上香參鬼王筵開濟煉啟玄章寶鼎初焚妙洞香面想青宫頻禮請願從雲路下仙行默運一誠先吟三禮稽首先天一炷香香雲繚繞徧十方此香願達青華府奏啟太乙救苦尊稽首先天二炷香香雲繚繞徧十方此香願達朱陵府奏啟十方靈寶尊稽首先天三炷香香雲繚繞偏十方此香願達黃華府奏啟道場諸聖眾救苦天尊下降萬朶金蓮生芽九頭獅子出雲霞俱赴蓬萊會上執事者各執其事鳴金者金鳴三匝擊鼓者鼓發三通金鼓齊鳴後十類孤魂驚請師登寶座說法度幽魂高功陞座超度三界難宏開方便門鍊機調水火苦爽盡䝉恩攝迹歸本天尊東極青華妙嚴宫紫霧霞光徹太空千朶蓮花映寶座九頭獅子出雲中丹臺寶笈開南府玄範垂章破北酆惟願垂恩來救苦人天淨土路遙通十方救苦天尊功代五老冠太上立教說法眾生悉皆聞知慈風浩蕩透硤石哀憫幽魂出離聞法昭章句讚壇中懺禮希夷十類孤魂盡皈依今宵黃籙妙偈黃籙齋筵臨妙宫青城山下說原因張氏麗華會造罪三官拷較甚分明丈人觀裡求懺悔哀告黃冠李若冲經卷未完離地府速登雲路早超昇一片貪嗔癡到底返成苦海大慈方成教今宵得遇慈航南斗光芒北斗明猶聞窻下讀書聲孤魂萬里復歸去空負洛陽花滿城太上大道君位列無何鄉寶光眞童子下履九幽方悲哉孤魂眾拔度痛哀傷二十四門戸咸令聞寶香明燈照長夜永消黑簿殃大慈大悲尋聲救苦無上無上慈尊伏以天階夜靜人巿更殘金烏己墜於西山玉兎將升於東海銀河耿耿乃分晝夜之期寶篆飄飄實判鬼神之際一聲聖號徹開地獄重城三炷眞香奏請雲霄列聖兆密運眞香䖍誠上啟東極青華教主太乙慈父救苦天尊南極朱陵度命天尊西極黃華蕩形天尊一元無上薩翁眞人左宫上相孚佑眞君靈寶啟教五師眞君韓司好生丈人眞君大慈大悲救苦眞人大慈大悲大惠眞人東嶽天齊仁聖帝君北陰酆都元卿大帝冥京十王慈仁眞君鐵圍山間面然鬼王朱陵火府諸眞聖眾南昌煉度師合干眞宰虛空過往遐邇神祗恭望鴻慈垂光濟度兆聞開天闢地三皇五帝以茫茫亘古傳今六道四生而滚滚不憑拔度之恩曷遂超凌之果孝信等切念幽魂之孤苦設放雲厨之法食賑濟九幽魂拔度三途滯魄俱有濟煉文函合行宣讀宣救苦疏功秘咒旛妙協雲囊啟紫庭玉符金簡度幽冥若超苦爽凌仙界請誦生天救苦經太上洞玄靈寶救苦妙經爾時救苦天尊偏滿十方界常以威神力救拔諸眾生得離於迷塗眾生不知覺如盲見日月我本太無中拔領無邊際慶雲開生門祥煙塞死戸初發玄元始以通祥感機救一切罪度一切厄𣺌𣺌超仙源蕩蕩自然清皆承大道力以伏諸魔精空中何灼灼名曰泥丸仙紫雲覆黃老是名三寶君還將上天炁以制九天魂救苦諸妙神善見救苦時天上混無分天炁歸一身皆成自然人自然有别體本在空洞中空洞跡非跡徧體皆虛空第一委炁立第二順炁生第三成萬法第四生光明天上三十六地下三十六太玄無邊際妙哉大洞經皈命太上尊能消一切罪東方玉寶皇上天尊南方玄眞萬福天尊西方太妙至極天尊北方玄上玉宸天尊東北方度仙上聖天尊東南方好生度命天尊西南方太靈虛皇天尊西北方無量太華天尊上方玉虛明皇天尊下方眞皇洞神天尊水符太乙慈尊降甘露九徧碗令口訣作用畢後念追魂咒二十一遍唵嗶𠺚喼唫喼唫唫喼唫㗆唻𡄦唻𡄦族唻𡄦口降唻𡄦喼唻𡄦口降唻𡄦唻口降𡄦口飛唻𡂃口攝唻𡄦法會發路炬黃旛立右當冩九干生神章經五仙中靈之炁大書仙字旛頂四帶三十六符旛身書生神章經炁四句云太微廻黃旗無英命靈旛攝召長夜府開度受生魂註黃旛象中炁之右故立於右大書仙字者以寓得上仙都之意太微上眞境之名廻轉也無英卽無英公子主人三魂長夜府卽九獄也不見日光之謂解又以黃旛言之黃旛亦長九尺竪立於右旛上當冩九天生神章經五仙中靈之炁大書仙字於上以寓罪魂得上仙鄉之意旛頂亦飄四帶分貼三十六符旛身亦排書生神章經炁四句其文云仗太微道炁廻轉中炁故立此黃旗無英公子主人之三魂今此黃旗實爲命靈魂之寶旛也頒救苦眞符入於九幽攝召彼長夜府之受苦罪魂使今得以開度脫離地獄而魂識受鍊更生也生神章經炁之文如此此符出於道藏生神玉章房集三内洞玄三十六部尊經元辰經十九篇志心召請東青青南赤赤中央世界黃衣童子下瑤堦手執黃旛來接引西白白北黑黑引將魂來引將魂來靈旛攝召天尊施食功德利兩途五靈梵語嘿賡呼幽鄉有滯同開泰化逐丹丘不夜都太上勅下開酆都眞言眾當持誦嗔唁唸𠺬哋口獄口開口仙噇吲𠮵唫口堦囄啲啀㗭呾哆㖿咄𠸋嗨呾哆唎咄𠸋嗨呾哆㖿吲吐唫口堦口蕯囄𠱃噠嘟哆唎嘟嘟哆唎咄口沉𠺗唏啲囄嗎𡁚吃啞㗳嘟哆唎嚍𠾸𠯈囉口天𠮵呿吽吽吒唎𠻷咣口明口照㗞口鐵口圍吪𡂴口城咄㗀口冥唵嘛呢叭𠺗吽喥哩啲吲口赴𡂫口萊猛火燄熖燒鐵城鐵城内面有孤魂若要孤魂離幽界諷誦生天救苦經道言十方諸天尊其數如沙塵化形十方界普濟度天人委炁聚功德同聲救罪人罪人實可哀我今說妙經念誦無休息歸身不暫停天堂享大福地獄無苦聲火翳成清署劍樹化爲騫上登朱陵府下入開光門超度三界難逕上元始天於是飛天神王無鞅數眾瞻仰尊顏而作頌曰天尊說經教接引於浮生勤脩學無爲悟眞道自成不迷亦不荒無我亦無名朗詠罪福句萬徧心垢清爾時飛天神王及諸仙眾說是頌畢稽首天尊奉辭而退茫茫酆都中丑重重金剛山申靈寶無量光卯洞照炎池煩辰九幽諸罪魂亥身隨香雲旛戍定慧生蓮花寅上昇神永安午功德金色光微微開幽暗華池流眞香蓮葢隨雲浮千靈冲元和常居十二樓急宣靈寶旨自在天堂遊寒庭多悲苦囘首禮元皇女青靈寶符中山眞帝書一念昇太清默念觀太無功德九幽下旋旋生紫虛功發路燭東方玉寶皇上尊皇上天尊風雷地獄拔度亡魂十方靈寶救苦尊救苦天尊唵啞吽吽啞唎吽吽吽東極宫中破開酆都第一層南方玄眞萬福尊萬福天尊火翳地獄拔度亡魂十方靈寶救苦尊救苦天尊唵啞吽吽啞唎吽吽吽東極宫中破開酆都第二層西方太妙至極尊至極天尊金剛地獄拔度亡魂十方靈寶救苦尊救苦天尊唵啞吽吽啞唎吽吽吽東極宫中破開酆都第三層北方玄上玉宸尊玉宸天尊溟冷地獄拔度亡魂十方靈寶救苦尊救苦天尊唵啞吽吽啞唎吽吽吽東極宫中破開酆都第四層東北度仙上聖尊上聖天尊鑊湯地獄拔度亡魂十方靈寶救苦尊救苦天尊唵啞吽吽啞唎吽吽吽東極宫中破開酆都第五層東南好生度命尊度命天尊銅柱地獄拔度亡魂十方靈寶救苦尊救苦天尊唵啞吽吽啞唎吽吽吽東極宫中破開酆都第六層西南太靈虛皇尊虛皇天尊屠割地獄拔度亡魂十方靈寶救苦尊救苦天尊唵啞吽吽啞唎吽吽吽東極宫中破開酆都第七層西北無量太華尊太華天尊火車地獄拔度亡魂十方靈寶救苦尊救苦天尊唵啞吽吽啞唎吽吽吽東極宫中破開酆都第八層上方玉虛明皇尊明皇天尊天牢地獄拔度亡魂十方靈寶救苦尊救苦天尊唵啞吽吽啞唎吽吽吽東極宫中破開酆都第九層下方眞皇洞神尊洞神天尊无間地獄拔度亡魂十方靈寶救苦尊救苦天尊唵啞吽吽啞唎吽吽吽東極宫中破開酆都第十層九幽拔罪尊拔罪天尊無量地獄拔度亡魂十方靈寶救苦尊救苦天尊唵啞吽吽啞唎吽吽吽東極宫中破開酆都十一層法橋大度尊大度天尊累刼地獄拔度亡魂十方靈寶救苦尊救苦天尊唵啞吽吽啞唎吽吽吽東極宫中破開酆都十二層大慈接引尊接引天尊女青地獄拔度亡魂十方靈寶救苦尊救苦天尊唵啞吽吽啞唎吽吽吽東極宫中破開酆都十三層朱陵度命尊度命天尊刀山地獄拔度亡魂十方靈寶救苦尊救苦天尊唵啞吽吽啞唎吽吽吽東極宫中破開酆都十四層慈航苦海尊苦海天尊劍樹地獄拔度亡魂十方靈寶救苦尊救苦天尊唵啞吽吽啞唎吽吽吽東極宫中破開酆都十五層青帝護魂尊護魂天尊硤石地獄拔度亡魂十方靈寶救苦尊救苦天尊唵啞吽吽啞唎吽吽吽東極宫中破開酆都十六層白帝滯魄尊滯魄天尊寒冰地獄拔度亡魂十方靈寶救苦尊救苦天尊唵啞吽吽啞唎吽吽吽東極宫中破開酆都十七層轉輪聖王尊聖王天尊爐炭地獄拔度亡魂十方靈寶救苦尊救苦天尊唵啞吽吽啞唎吽吽吽東極宫中破開酆都十八層擊尺破之後念秘咒運諱揑訣超凌仙界天尊伏以陰陽首判清濁肇分堯天蕩蕩歎古今之興廢禹迹茫茫視江山而不改龍爭虎鬪混亂天下九州君聖臣良獨併寰中一統三畧六韜葢國英雄何在五經列史貫世文章那存三教門徒九流藝術士農工商不等琴棋書畫皆同隔越關山之遠飄逢雲水之遊父母資財總成空妻子恩愛俱是夣奉公爲吏厭俗出家辜負平生之願虛勞出世之機遭時疫而夫妻並喪遇產難而母子俱亡徒流笞杖以殞身絞斬分形而棄命饑荒餓殍大刼狂徒蛇傷虎咬及雷誅溺水懸樑並火化盡是殘生惡鬼皆爲枉死强魂盲聾瘖瘂生爲異井之人瘸跛風顚死作離鄉之鬼罕逢故友少遇知音屍露紅蓼灘頭骨堆綠柳堤畔春去秋囘聞鳥唱寒來暑往聽漁歌尺書難寄於雙裡寸心難達與孤鴻五音苦爽六道幽靈黃壤未沾新化雨紅塵不改舊家風今宵主發大慈悲願眞人啟無上妙道修建九幽之齋筵賑濟三途之鬼趣聞今一聲之召請勿辭千里以來臨恭對長空稱揚大偈前亡後化眾孤魂有主無依恐不聞星月濛濛籠古道細雨飄飄罩荒村可憐白骨堆黃土空憶新屍葬舊墳此夜好承功德力花旛召請望來臨志一心召請堯疆之外孤魂眾禹甸之中眾鬼魂佐國文賢孤魂眾安邦武士眾鬼魂北陰界内孤魂眾地府城中眾鬼魂無極界内孤魂眾有生類中眾鬼魂三千界内孤魂眾四大部眾鬼魂九州界内孤魂眾萬國之中眾鬼魂南浮界内孤魂眾震旦國中眾鬼魂琳宫羽士仙靈眾杖履袈裟眾僧魂奉天征討孤魂眾坐賈行商眾鬼魂點穴尋龍孤魂眾傳神繪像眾鬼魂十載寒窻孤魂眾幾年丹竈眾鬼魂三世功名孤魂眾失本忘家眾鬼魂肥馬輕裘孤魂眾少衣缺食眾鬼魂鹵莾樵夫孤魂眾綠蓑釣叟眾鬼魂義絕情疎孤魂眾鬪毆傷殘眾鬼魂三途滯魄孤魂眾五音十類眾鬼魂懸樑弔頸孤魂眾王法嚴刑眾鬼魂五勞七傷孤魂眾枉死傷亡眾鬼魂投河落水孤魂眾巖摧樹折眾鬼魂自刎自縊孤魂眾胎前產後眾鬼魂此境界内孤魂眾附近鄉村眾鬼魂此夜今時來接引花旛召請望來臨再聲召請地盤業主及親鄰阜老先賢並陌客有主承無祭祀流今亘古千年墳萬年墓暑往寒來惟願前亡後化眾先賢有主無依不計年今宵授我眞科度脫離苦海上丹天此夜今時來臨法會香花召請望來臨花旛召請望來臨太乙救苦天尊天尊聖號妙無窮應化如神頃刻中楊柳枝頭甘露灑祥光照處破羅酆青華長樂界東極妙嚴宫七寶芳騫林九色蓮花座萬眞環拱内百億瑞光中玉清天寶尊應化玄元始浩刼垂慈濟大千甘露門妙道眞身紫金瑞相隨機赴感誓願無邊大聖大慈大悲大願十方化號普度眾生億億刼中度人無量尋聲赴感太乙救苦天尊青玄上帝天尊符命下丹臺童子傳言地獄開燦燦神華輝夜府幽魂拔出九泉來超凌仙界天尊宣十傷符伏以三途罷拷六道臨壇生於萬國九州之内居於五獄四凟之中春秋之世叛亂眞主草主戰國之時並吞