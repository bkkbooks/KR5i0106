法如是持莫將心緣心還莫住絕緣心在莫存心眞則守眞淵修理志離志積修不符離志而不修志已業無己知諸食炁結炁非諸久定結炁歸諸本炁隨取當隨洩奉請變食神王變食小吏變此法食遍滿天地自然天㕑食普及於一切神魂饑渴者盡沾甘露味奉請東王公西王母太乙天尊降甘露三天無量食充滿法界中濟汝饑渴者清淨無量身饑虛生飽滿𤍠惱得清凉一切饑渴者同登極樂界人倫仙子汝等魔靈眾吾今施汝供一粒偏十方餓鬼河沙鬼神用地獄畜生自然天厨食吾今爲加持一粒遍十方河沙鬼神用饑渴永消滅食之赴瑤池今將獻幽魂功德不思議超生脫化天尊普施甘露濟沉幽十類孤魂歸善儔自此遷神生淨土蓬來仙境好遨遊超生三界天尊向來宣行斛食並已周圓妙用端嚴眞神澄正湛湛性天現出本來面目明明心鏡看破自己元神將反生於人道卽進品於仙階囘光返照證果成眞須當皈依三寶然後聽說九戒超生淨土天尊玄元闡化道經師普度人天衍大慈接引孤魂歸淨土志心禮叩莫遲遲第一皈依無上道寶夫道寶者無形無名因相顯法運行日月覆載乾坤自在無爲希夷莫測爲萬物之奥作聖賢之原報本皈依仰遵道寶能消身孽不墮地獄第二皈依玄上經寶夫經寶者玉篇雲篆金簡靈文八角垂芒大方一丈三十六部四品五千道按三乘報本皈依仰遵經寶能消心孽不墮餓鬼第三皈依太上師寶夫師寶者一切顓䝉皆垂接引十方苦海仰假慈航願籍師資提擕正果敬禮法身報本皈依仰遵師寶能消口業不墮畜生宣告汝等諸仙子眾歸依三寶己畢從今萬罪消除斷卻貪嗔癡愛掃滅奸盗邪淫修身按孝悌忠信蒞政行禮義亷恥省心悟道永離地獄之苦聽戒登眞常享天堂之樂示諭孤魂精誠受偈祖師眞機秘法傳玄微普濟度人天壇下仙子來參受須聽眞師說戒言第一戒者敬讓孝順父母夫孝者天之經也地之義也民之行也孝弟也者其爲人之本與能持此戒是曰初眞將來託生人中獲端正長夀之果能持此戒名曰初眞戒汝等仙子可能持否眾答天上人間信受奉行第二戒者克勤忠於君王進思進忠退思補過旣明且哲以保其身夙夜匪懈以事一人能持此戒是曰念眞將來託生人中獲祿位清顯之果能持此戒名曰念眞戒汝等仙子可能持否天上人間信受奉行第三戒者不殺慈救眾生見其生不忍見其死聞其聲不忍食其肉是以君子遠庖厨也能持此戒是日持眞將來託生人中獲富貴豪盛之果能持此戒名曰持眞戒汝等仙子可能持否天上人間信受奉行第四戒者不淫正身處物戒愼乎其所不睹恐懼乎其所不聞莫見乎隱莫顯乎微故君子愼其獨也能持此戒是曰正眞將來託生人中獲吉慶安樂之果能持此戒名曰正眞戒汝等仙子可能持否天上人間信受奉行第五戒者不盗仗義利人見利思義見危授命久要不忘平生之言亦可以爲成人矣能持此戒是曰保眞將來託生人中獲清淨善信之果能持此戒名曰保眞戒汝等仙子可能持否天上人間信受奉行第六戒者不嗔實和忍耐君子嘉善而矜不能炎火焚天徒自傷也能持此戒是曰修眞將來託生人中獲聰明智慧之果能持此戒號曰修眞戒汝等仙子可能持否天上人間信受奉行第五戒者不詐直道處世君子以仁存心以禮存心巧言令色君子不由仁也能持此戒是曰成眞將來託生人中獲十相具足之果能持此戒號曰成眞戒汝等仙子可能持否天上人間信受奉行第八戒者不驕恭謹持身君子畏天命畏大人畏聖人之言小人不知天命而不畏也能持此戒是曰得眞將來託生人中獲無上正眞之果能持此戒號曰得真戒汝等仙子可能持否天上人間信受奉行第九戒者不二奉道專一天道一而己矣造次必於是顛沛必於是至於從心所欲不踰矩能持此戒是曰全眞將來託生人中獲大道法王之果能持此戒號曰全眞戒汝等仙子可能持否天上人間信受奉行如是九眞妙戒實乃三清之隱文上天所寶下士罕聞悟一字得一字之功受一戒得一戒之果既聞秘語必透玄機琅王函開處當壇説破是非門璚誥宣時對面豁開生死路一去一來無掛無碍與道長存逍遥自在香蠋花中不夜天祥雲影裏黍珠懸霞衣玉局臨軒降寶籙金章第次宣所具時間昇𨗠鏑形𢓔魂處品南宫𨗠化成人刼刼長存與天齊年五苦人堆逍遙上清太上勅赦生天寶籙謹當告下宣寶籙化己焚戒元姞符命北都零池洁魔保奉亡魂受竦生生受度隨刼蠟轉永度三邊超受三界寶籙臨壇宣揚給附仗此良因早生淨界教有偈章再聲吟咏萬里悲號實可哀五音苦爽喪泉臺賢愚並集齊齋事貴賤同升入道陔頓解饑虛飽充腹全消憂悶喜盈顋從兹地府無拘阻雲路逍遙任去來廣度無量天尊當感眞師給判書形神俱妙合元初超生好向丹天去始相玄功度有餘此世因前世修後世因今世修莫謂無緣修不得只今到岸好囘頭休悲切免傷情這囘莫作等閑評畨身舉步風雲送化現當空月正明逍遙步自在行聽誦中篇上玉京法橋大度天尊元始靈書中篇東方靈書亶婁阿薈無惒觀音須延明首法攬菩曇稼那阿奕忽訶流吟華都曲麗鮮菩育臻答落大梵㪚烟慶雲飛灑玉都明魔上門無行上首囘蹠流玄阿陀龍羅四象吁員南方靈書南𨶒洞浮玉眸詵詵梵形落空九靈推前凙𠗂菩臺綠羅大千𦕈莾九醜韶言淫緣邅雲上九都飛生自騫那育郁馥魔羅法輪霐持無鏡攬姿運容馥朗廓奕神纓自宫西方靈書刀利禪猷婆尼咎通宛藪滌色太𦕈之堂流羅梵萌景蔚蕭嵎易邈無寂宛首少都阿郁竺華莫延由九開自辯阿那品首無量扶葢浮羅合神玉誕長桑柏空度仙北方靈書玃無自育九日導乾坤母東覆形攝上玄陀羅育邈𦕈炁合雲飛天大醜總監上天沙陁刼量龍漢瑛鮮碧落浮黎空歌保珍惡奕無品洞妙至眞元梵恢漠幽寂度人子丑玉子子丑午唵吽吒唎𠰮㕭㖇呿午未坤離玉子魑魁斗旨𩲕𩲓魁斗尊魁斗勝無上混元宗壇遵奉元始符命疾如風火十方三界頃刻遙聞宣召靈寶變食神王三天持寶籙將軍生神九章符使地道功曹三元五道大神五方引魂童子社令里域神員合干官君將吏是日所備法食品饌均垂歆受承領符籙護送魂儀具有關文合行宣告宣護送關化己關文宣示神聽必從於就法壇用憑火化護送十方孤魂往生南宫生天脫化教有眞言羽眾加持魂神澄正萬炁長存不經苦惱身有光明三界侍衞五帝司迎萬神朝禮名書上天功滿德就飛昇上清急急如律令用令望空大書此諱畢揑子文默念火鈴炎熾子成變八方未速送眾魂巳上寅生丑天玉堂午出兩手揑蓮花訣存孤魂在中宮水火二炁九鍊成眞升上泥丸直出一線人天脫化逕上南宫見存獲福生天得道天尊伏以餓鬼道中久隨塵沙之刼愛河岸上難瞻天日之光若非太上留此因緣安得汝等離諸苦趣沉淪實久矣憔悴可哀哉臨軒對月夜沉沉泣雨啼春聲嘖嘖黃沙度口凄凉荒草夕陽天白浪江頭冷冷淡淡寒食節白骨成堆誰個是主黑風漂蕩何處家鄕幸逢此日法筵開積刼累年𡨚債釋九重鳳詔幽關夜壑悉番騰萬斛龍舟苦海愛河輕掉過俱沾妙力隨願超昇法侣慈悲同音讚咏東極宫青華府太乙救苦大天尊天塗滅卻驅雷苦奉送孤魂第一程步步蓮花生足下歡歡喜喜上朱陵送孤魂上朱陵聞經悟道大天尊南極宫朱陵府火鍊丹界大天尊地塗滅卻負石苦奉送孤魂第二程步步蓮花生足下歡歡喜喜上朱陵送孤魂上朱陵聞經悟道大天尊西極宫黃華府生天得道大天尊水塗滅卻推沙苦奉送孤魂第三程步步蓮花生足下歡歡喜喜上朱陵送孤魂上朱陵聞經悟道大天尊伏以三陽濟煉最上妙緣承斯神力普濟幽魂伏願銅柱風雷變清涼之淨界鑊湯溟冷化七寶之瑤池羅酆山下作蓬萊之閬苑鐵圍無間成洞府之仙鄉三途息苦八難停酸先祖禰師友宗親速居快樂之登之路修眞霞友悟本性之眞原聞法善人了玄關之奥妙四恩並報三宥齊資一切有情同登道岸志心稱念生天得道天尊向來濟煉功德並以周圓九玄七祖以超昇四生六道而脫化男乘白鶴女跨青鸞逍遙不夜之天清淨長明之境東極慈尊放祥光而接引南丹眞老指雲路以超昇道歸三千銀世界常安常樂天京十二玉樓臺爰居爰處千江有水千江月萬里無雲萬里天此夜好向天堂路當來果報善因緣孤魂孤魂悉爾遙聞東有蓬萊島南遊朱陵府西有大福堂北無寒庭苦今宵追薦後孤魂早超昇志心稱念承功脫化天尊不可思議功德卜坐囘謝元始傳言地獄開無鞅數眾自天來今宵大演慈悲法禮畢還當下寶臺道太乙救苦尊稽首皈依無上經囘謝十方靈寶尊師道場諸聖眾踏開三寶座師返九蓮臺幽魂生淨界五福自天來廣成儀制鐵鏆斛食全集終二仙菴藏板
