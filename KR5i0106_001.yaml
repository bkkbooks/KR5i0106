body:
  text: 武陽雲峯羽客陳仲遠校輯上香參鬼王筵開濟煉啓玄章寶鼎初焚妙洞香面想青宫頻禮請願從雲路下仙行默運一誠先吟三禮稽首先天一炷香香雲繚繞遍十方此香願達青華府奏啓太乙救苦尊稽首先天二炷香香雲繚繞遍十方此香願達朱陵府奏啓十方靈寶尊稽首先天三炷香香雲繚繞偏十方此香願達黃華府奏啓道場諸聖衆救苦天尊下降萬朵金蓮生芽九頭獅子出雲霞俱赴蓬萊會上執事者各執其事鳴金者金鳴三匝擊鼓者鼓發三通金鼓齊鳴後十類孤魂驚請師登寶座說法度幽魂高功升座超度三界難宏開方便門鍊機調水火苦爽盡䝉恩攝迹歸本天尊東極青華妙嚴宫紫霧霞光徹太空千朵蓮花映寶座九頭獅子出雲中丹臺寶笈開南府玄範垂章破北酆惟願垂恩來救苦人天淨土路遙通十方救苦天尊功代五老冠太上立教說法衆生悉皆聞知慈風浩蕩透硤石哀憫幽魂出離聞法昭章句讚壇中懺禮希夷十類孤魂盡皈依今宵黃籙妙偈黃籙齊筵臨妙宫青城山下說原因張氏麗華會造罪三官拷較甚分明丈人觀裡求懺悔哀告黃冠李若冲經卷未完離地府速登雲路早超升一片貪嗔癡到底返成苦海大慈方成教今宵得遇慈航南斗光芒北斗明猶聞窗下讀書聲孤魂萬里復歸去空負洛陽花滿城太上大道君位列無何鄉寶光真童子下履九幽方悲哉孤魂衆拔度痛哀傷二十四門戶咸令聞寶香明燈照長夜永消黑簿殃大慈大悲尋聲救苦無上無上慈尊伏以天階夜靜人巿更殘金烏己墜於西山玉兔將升於東海銀河耿耿乃分晝夜之期寶篆飄飄實判鬼神之際一聲聖號徹開地獄重城三炷真香奏請雲霄列聖兆密運真香䖍誠上啓東極青華教主太乙慈父救苦天尊南極朱陵度命天尊西極黃華蕩形天尊一元無上薩翁真人左宫上相孚佑真君靈寶啓教五師真君韓司好生丈人真君大慈大悲救苦真人大慈大悲大惠真人東嶽天齊仁聖帝君北陰酆都元卿大帝冥京十王慈仁真君鐵圍山間面然鬼王朱陵火府諸真聖衆南昌煉度師合干真宰虛空過往遐邇神祗恭望鴻慈垂光濟度兆聞開天闢地三皇五帝以茫茫亘古傳今六道四生而滚滚不憑拔度之恩曷遂超凌之果孝信等切念幽魂之孤苦設放雲厨之法食賑濟九幽魂拔度三途滯魄俱有濟煉文函合行宣讀宣救苦疏功祕咒幡妙協雲囊啓紫庭玉符金簡度幽冥若超苦爽凌仙界請誦生天救苦經太上洞玄靈寶救苦妙經爾時救苦天尊偏滿十方界常以威神力救拔諸衆生得離於迷塗衆生不知覺如盲見日月我本太無中拔領無邊際慶雲開生門祥煙塞死戶初發玄元始以通祥感機救一切罪度一切厄渺渺超仙源蕩蕩自然清皆承大道力以伏諸魔精空中何灼灼名曰泥丸仙紫雲覆黃老是名三寶君還將上天氣以制九天魂救苦諸妙神善見救苦時天上混無分天氣歸一身皆成自然人自然有别體本在空洞中空洞跡非跡遍體皆虛空第一委氣立第二順氣生第三成萬法第四生光明天上三十六地下三十六太玄無邊際妙哉大洞經皈命太上尊能消一切罪東方玉寶皇上天尊南方玄真萬福天尊西方太妙至極天尊北方玄上玉宸天尊東北方度仙上聖天尊東南方好生度命天尊西南方太靈虛皇天尊西北方無量太華天尊上方玉虛明皇天尊下方真皇洞神天尊水符太乙慈尊降甘露九遍碗令口訣作用畢後念追魂咒二十一遍唵嗶𠺚喼吟喼吟吟喼吟㗆唻𡄦唻𡄦族唻𡄦口降唻𡄦喼唻𡄦口降唻𡄦唻口降𡄦口飛唻𡂃口攝唻𡄦法會發路炬黃幡立右當寫九干生神章經五仙中靈之氣大書仙字幡頂四帶三十六符幡身書生神章經氣四句云太微回黃旗無英命靈幡攝召長夜府開度受生魂注黃幡象中氣之右故立於右大書仙字者以寓得上仙都之意太微上真境之名回轉也無英即無英公子主人三魂長夜府即九獄也不見日光之謂解又以黃幡言之黃幡亦長九尺竪立於右幡上當寫九天生神章經五仙中靈之氣大書仙字於上以寓罪魂得上仙鄉之意幡頂亦飄四帶分貼三十六符幡身亦排書生神章經氣四句其文云仗太微道氣回轉中氣故立此黃旗無英公子主人之三魂今此黃旗實為命靈魂之寶幡也頒救苦真符入於九幽攝召彼長夜府之受苦罪魂使今得以開度脫離地獄而魂識受鍊更生也生神章經氣之文如此此符出於道藏生神玉章房集三內洞玄三十六部尊經元辰經十九篇志心召請東青青南赤赤中央世界黃衣童子下瑤階手執黃幡來接引西白白北黑黑引將魂來引將魂來靈幡攝召天尊施食功德利兩途五靈梵語默賡呼幽鄉有滯同開泰化逐丹丘不夜都太上敕下開酆都真言衆當持誦嗔唁念𠺬哋口獄口開口仙噇哂𠮵吟口階囄啲啀㗭呾哆㖿咄𠸋嗨呾哆唎咄𠸋嗨呾哆㖿哂吐吟口階口蕯囄𠱃噠嘟哆唎嘟嘟哆唎咄口沉𠺗唏啲囄嗎𡁚吃啞嗒嘟哆唎嚍𠾸𠯈囉口天𠮵呿吽吽吒唎𠻷咣口明口照㗞口鐵口圍吪𡂴口城咄㗀口冥唵嘛呢叭𠺗吽喥哩啲哂口赴𡂫口萊猛火焰熖燒鐵城鐵城內面有孤魂若要孤魂離幽界諷誦生天救苦經道言十方諸天尊其數如沙塵化形十方界普濟度天人委氣聚功德同聲救罪人罪人實可哀我今說妙經念誦無休息歸身不暫停天堂享大福地獄無苦聲火翳成清署劍樹化為騫上登朱陵府下入開光門超度三界難徑上元始天於是飛天神王無鞅數衆瞻仰尊顏而作頌曰天尊說經教接引於浮生勤修學無為悟真道自成不迷亦不荒無我亦無名朗詠罪福句萬遍心垢清爾時飛天神王及諸仙衆說是頌畢稽首天尊奉辭而退茫茫酆都中丑重重金剛山申靈寶無量光卯洞照炎池煩辰九幽諸罪魂亥身隨香雲幡戍定慧生蓮花寅上升神永安午功德金